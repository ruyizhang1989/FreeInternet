{% extends "base.html" %}

{% block title %}任务列表{% endblock %}

{% block content %}
<h2>任务列表</h2>
{% for task in tasks %}
<div class="task">
    <h3><a href="/task/{{ task.id }}">{{ task.title }}</a></h3>
    <p>{{ task.description }}</p>
    <p>发布者: {{ task.poster_name }}</p>
    <p>发布时间: {{ task.created_at }}</p>
</div>
{% endfor %}
{% endblock %}
